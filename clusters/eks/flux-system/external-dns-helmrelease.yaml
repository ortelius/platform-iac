apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: flux-system
spec:
  dependsOn:
    - name: aws-load-balancer-controller
      namespace: flux-system
  interval: 5m
  targetNamespace: kube-system
  chart:
    spec:
      chart: external-dns
      version: ">=1.14.0"
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: flux-system
  install:
    createNamespace: true
  values:
    provider: cloudflare
    txtOwnerId: pdvd-eks
    env:
      - name: CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: pdvd-secrets
            key: cloudflare.apiToken
