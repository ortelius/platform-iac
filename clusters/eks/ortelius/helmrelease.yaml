apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ortelius
  namespace: flux-system
spec:
  # Wait for ALB controller to be ready before installing ortelius.
  # The ALB controller webhook must be available before any Service or Ingress
  # objects are created, otherwise the install fails with webhook errors.
  # external-dns is not listed here — it uses the Cloudflare API directly
  # and does not block ortelius from installing successfully.
  dependsOn:
    - name: aws-load-balancer-controller
      namespace: flux-system
  interval: 5m
  targetNamespace: ortelius
  install:
    createNamespace: true
  chart:
    spec:
      chart: ortelius
      version: ">=12.0.0"
      sourceRef:
        kind: HelmRepository
        name: helmcharts
        namespace: flux-system
      interval: 5m
  valuesFrom:
    - kind: ConfigMap
      name: values
    - kind: Secret
      name: ortelius-secrets
