pdvd-arangodb:
  cloudProvider: "eks"
  nodeSelector:
    topology.kubernetes.io/zone: us-east-1a
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1.5Gi"
      cpu: "1000m"

pdvd-frontend:
  ingress:
    enabled: true
    type: alb
    host: eks.deployhub.com
    certificateArn: arn:aws:acm:us-east-1:754991274490:certificate/9941adaf-1e57-4d4b-8f3b-19f39a08f6b2
    subnets: "subnet-0b05b742afe63e801,subnet-0039ffbf964e9a59e"
  graphqlEndpoint: "https://eks.deployhub.com/api/v1/graphql"
  restapiEndpoint: "https://eks.deployhub.com/api/v1"

pdvd-backend:
  ingress:
    enabled: true
    type: alb
    host: eks.deployhub.com
    certificateArn: arn:aws:acm:us-east-1:754991274490:certificate/9941adaf-1e57-4d4b-8f3b-19f39a08f6b2
    subnets: "subnet-0b05b742afe63e801,subnet-0039ffbf964e9a59e"
  rbac_repo: https://github.com/ortelius/pdvd-rbac
  apiBaseUrl: https://eks.deployhub.com/api
  github:
    appName: pdvd
    org: ortelius
