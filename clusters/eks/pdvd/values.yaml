# clusters/eks/pdvd/values.yaml
# Plain (non-secret) values for the pdvd HelmRelease on EKS.
# Merged with secrets.enc.yaml by FluxCD before passing to Helm.
#
# certificateArn → terraform output: acm_certificate_arn
# subnets        → terraform output: public_subnet_ids (comma-separated)
#
# Secret values live in secrets.enc.yaml (same structure as GKE,
# re-encrypted with the EKS AWS KMS key).

pdvd-frontend:
  graphqlEndpoint: "https://app.deployhub.com/api/v1/graphql"
  restapiEndpoint: "https://app.deployhub.com/api/v1"
  ingress:
    type: alb
    host: "app.deployhub.com"
    scheme: "internet-facing"
    certificateArn: ""        # fill from: terraform -chdir=terraform/eks output -raw acm_certificate_arn
    subnets: ""               # fill from: terraform -chdir=terraform/eks output -json public_subnet_ids | jq -r 'join(",")'

pdvd-backend:
  ingress:
    type: alb
    host: "app.deployhub.com"
    scheme: "internet-facing"
    certificateArn: ""        # same cert as above
    subnets: ""               # same subnets as above
  rbac_repo: "https://github.com/ortelius/pdvd-rbac.git"
  apiBaseUrl: "https://app.deployhub.com"
  baseUrl: "https://app.deployhub.com"
  github:
    appName: "deployhub"
    appId: "2727141"
    clientId: "Iv23liKdUQ34YPWnFfvu"

pdvd-arangodb: {}   # password comes from secrets.enc.yaml

smtp:
  enabled: true
  host: "smtp.gmail.com"
  port: "587"
  fromEmail: "steve@deployhub.com"
  fromName: "Steve Taylor"
  # username and password come from secrets.enc.yaml
