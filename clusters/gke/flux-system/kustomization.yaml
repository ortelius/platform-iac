apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - gotk-components.yaml
  - gotk-sync.yaml
  - ortelius-kustomization.yaml
patches:
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: kustomize-controller
        namespace: flux-system
      spec:
        template:
          spec:
            containers:
              - name: manager
                env:
                  - name: SOPS_AGE_KEY
                    valueFrom:
                      secretKeyRef:
                        name: sops-age
                        key: age.agekey
    target:
      kind: Deployment
      name: kustomize-controller