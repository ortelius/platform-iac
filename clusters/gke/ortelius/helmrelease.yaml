apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ortelius
  namespace: flux-system   
spec:
  interval: 5m
  targetNamespace: ortelius     
  install:
    createNamespace: true
  chart:
    spec:
      chart: ortelius
      version: ">=12.0.0"
      sourceRef:
        kind: HelmRepository
        name: helmcharts
        namespace: flux-system
      interval: 5m
  valuesFrom:
      - kind: ConfigMap
        name: values
      - kind: Secret
        name: ortelius-secrets
